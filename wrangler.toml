name = "forge-gtm"
main = ".open-next/worker.js"
compatibility_date = "2024-07-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
SENDING_DOMAIN = "outreach.yourdomain.com"
DEFAULT_FROM_NAME = "Your Name"

# Secrets — set these in the Cloudflare dashboard under Workers > Settings > Variables:
# DATABASE_URL
# ANTHROPIC_API_KEY
# RESEND_API_KEY
# RESEND_WEBHOOK_SECRET
# CLERK_SECRET_KEY
# NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
# DEFAULT_FROM_EMAIL
