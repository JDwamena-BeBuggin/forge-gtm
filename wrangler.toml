name = "forge-gtm"
main = "worker.ts"
compatibility_date = "2026-05-04"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/5 * * * *"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
SENDING_DOMAIN = "outreach.yourdomain.com"
DEFAULT_FROM_NAME = "Your Name"
DISABLE_AUTH = "true"

# Secrets — set these in the Cloudflare dashboard under Workers > Settings > Variables:
# DATABASE_URL
# OPENAI_API_KEY
# RESEND_API_KEY
# RESEND_WEBHOOK_SECRET
# CLERK_SECRET_KEY
# NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
# DEFAULT_FROM_EMAIL
